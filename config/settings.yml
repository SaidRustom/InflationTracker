start_date: "2000-01-01"
inflation_band: {low: 1.0, high: 3.0}
thresholds:
  # monthly: CPI observations are dated to the month start but publish ~6 weeks later,
  # so the newest observation legitimately reaches ~77d old just before the next
  # release. 95 tolerates the normal cycle while still alarming on a dead series.
  staleness_days: {daily: 7, weekly: 14, monthly: 95}
  max_null_ratio: 0.20
  value_ranges:
    policy:    [-1.0, 25.0]
    funding:   [-1.0, 25.0]
    yield:     [-2.0, 25.0]
    lending:   [0.0, 30.0]
    inflation: [-5.0, 25.0]
    headline:  [-5.0, 25.0]

revisions:
  # How many of the most recent ledger events site/data/revisions.json carries. The
  # ledger keeps every event forever; the page states "showing N of TOTAL" so the cap
  # is never a silent truncation.
  publish_limit: 100
